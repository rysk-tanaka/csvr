name: Release

on:
  push:
    branches: [main]
    paths: ['Cargo.toml']
  workflow_dispatch:

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::This workflow can only be run from the main branch (current: ${{ github.ref }})"
          exit 1

  create-release:
    needs: validate-branch
    permissions:
      contents: write
    uses: rysk-tanaka/workflows/.github/workflows/release-on-version-change.yml@main
    with:
      version_source: cargo_toml
      tag_prefix: v
      force_released_output: ${{ github.event_name == 'workflow_dispatch' }}
    secrets: inherit

  upload-binary:
    needs: create-release
    if: needs.create-release.outputs.released == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-13
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        run: |
          tar czf csvr-${{ needs.create-release.outputs.tag }}-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release csvr
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ needs.create-release.outputs.tag }} \
            csvr-${{ needs.create-release.outputs.tag }}-${{ matrix.target }}.tar.gz \
            --clobber
